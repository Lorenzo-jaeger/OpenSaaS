version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: opensaas-db
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: opensaas
    ports:
      - '5432:5432'
    volumes:
      - postgres_data:/var/lib/postgresql/data

  mailpit:
    image: axllent/mailpit
    container_name: opensaas-mail
    restart: always
    ports:
      - '8025:8025'
      - '1025:1025'

volumes:
  postgres_data:
